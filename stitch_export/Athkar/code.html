<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Azkar Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'dark-green': '#1F3E33',
            'gold': '#D6C291',
            'cream-bg': '#FCFAF3',
            'card-bg': '#FFFFFF',
            'icon-bg-blue': '#C6DFD2',
            'icon-bg-yellow': '#F1E3B8',
          },
          fontFamily: {
            'sans': ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    /* Adding a subtle pattern to cards as seen in the mockup */
    .card-pattern {
      background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 0 L100 50 L50 100 L0 50 Z" fill="none" stroke="%23E5E7EB" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/></svg>');
      background-size: cover;
      background-position: center;
    }
    
    /* Header rounded corners */
    .header-rounded {
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }
  </style>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-cream-bg text-dark-green h-screen flex flex-col font-sans">
<!-- BEGIN: MainHeader -->
<header class="bg-dark-green text-gold flex items-center justify-between px-6 pt-12 pb-6 header-rounded shadow-md z-10 sticky top-0" data-purpose="top-navigation">
<!-- Right arrow (RTL layout) -->
<button aria-label="Go back" class="text-2xl">
<i class="fa-solid fa-arrow-right"></i>
</button>
<!-- Title -->
<h1 class="text-2xl font-bold tracking-wider">الأذكار</h1>
<!-- Hamburger menu -->
<button aria-label="Menu" class="text-2xl">
<i class="fa-solid fa-bars"></i>
</button>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: Main Content -->
<main class="flex-1 overflow-y-auto px-4 py-6" data-purpose="azkar-grid">
<div class="grid grid-cols-2 gap-4">
<!-- Card 1: Morning Azkar -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-blue rounded-2xl flex items-center justify-center">
<i class="fa-regular fa-sun text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">أذكار الصباح</span>
</button>
<!-- Card 2: Evening Azkar -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-yellow rounded-2xl flex items-center justify-center">
<i class="fa-regular fa-moon text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">أذكار المساء</span>
</button>
<!-- Card 3: After Prayer Azkar -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-blue rounded-2xl flex items-center justify-center">
<i class="fa-solid fa-mosque text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">أذكار بعد الصلاة</span>
</button>
<!-- Card 4: Before Sleep Azkar -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-yellow rounded-2xl flex items-center justify-center">
<i class="fa-solid fa-moon text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">أذكار قبل النوم</span>
</button>
<!-- Card 5: Waking Up Azkar -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-blue rounded-2xl flex items-center justify-center">
<i class="fa-regular fa-clock text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">أذكار الاستيقاظ</span>
</button>
<!-- Card 6: Entering Home -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-yellow rounded-2xl flex items-center justify-center">
<i class="fa-solid fa-house text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">دخول المنزل</span>
</button>
<!-- Card 7: Leaving Home -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-yellow rounded-2xl flex items-center justify-center">
<i class="fa-solid fa-door-open text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">الخروج من المنزل</span>
</button>
<!-- Card 8: Food Azkar -->
<button class="bg-card-bg card-pattern border-[1.5px] border-gold rounded-xl p-5 flex flex-col items-center justify-center gap-4 shadow-[0_4px_6px_rgba(0,0,0,0.05)] hover:shadow-md transition-shadow">
<div class="w-16 h-16 bg-icon-bg-blue rounded-2xl flex items-center justify-center">
<i class="fa-solid fa-utensils text-2xl text-dark-green"></i>
</div>
<span class="text-dark-green font-bold text-sm">أذكار الطعام</span>
</button>
</div>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Bottom Navigation -->
<nav class="bg-white border-t border-gray-200 pb-safe pt-2 px-2 flex justify-between items-center z-10" data-purpose="bottom-navigation">
<!-- Home Tab -->
<a class="flex flex-col items-center justify-center w-1/5 py-2 text-dark-green" href="#">
<i class="fa-solid fa-house text-xl mb-1"></i>
<span class="text-[10px] font-medium">الرئيسية</span>
</a>
<!-- Quran Tab -->
<a class="flex flex-col items-center justify-center w-1/5 py-2 text-dark-green" href="#">
<i class="fa-solid fa-book-open text-xl mb-1"></i>
<span class="text-[10px] font-medium">القرآن</span>
</a>
<!-- Prayer Tab -->
<a class="flex flex-col items-center justify-center w-1/5 py-2 text-dark-green" href="#">
<i class="fa-solid fa-person-praying text-xl mb-1"></i>
<span class="text-[10px] font-medium">الصلاة</span>
</a>
<!-- Azkar Tab (Active) -->
<div class="flex flex-col items-center justify-center w-1/5 relative text-gold py-2">
<!-- Active Top Indicator -->
<div class="absolute top-0 w-[40px] h-[3px] bg-gold rounded-b-md"></div>
<i class="fa-solid fa-tags text-xl mb-1"></i>
<span class="text-[10px] font-bold">الأذكار</span>
</div>
<!-- More Tab -->
<a class="flex flex-col items-center justify-center w-1/5 py-2 text-dark-green" href="#">
<i class="fa-solid fa-ellipsis text-xl mb-1"></i>
<span class="text-[10px] font-medium">المزيد</span>
</a>
</nav>
<!-- END: Bottom Navigation -->
<!-- Adding safe area spacing for iOS -->
<style>
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
  </style>
</body></html>
